global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    project: venture-studio-os

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: /metrics

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8020']
    metrics_path: /metrics

  - job_name: 'agent-orchestrator'
    static_configs:
      - targets: ['agent-orchestrator:8001']
    metrics_path: /metrics

  - job_name: 'market-intel'
    static_configs:
      - targets: ['market-intel:8002']
    metrics_path: /metrics

  - job_name: 'opportunity-engine'
    static_configs:
      - targets: ['opportunity-engine:8003']
    metrics_path: /metrics

  - job_name: 'product-factory'
    static_configs:
      - targets: ['product-factory:8004']
    metrics_path: /metrics

  - job_name: 'startup-generator'
    static_configs:
      - targets: ['startup-generator:8005']
    metrics_path: /metrics

  - job_name: 'investment-pipeline'
    static_configs:
      - targets: ['investment-pipeline:8006']
    metrics_path: /metrics

  - job_name: 'growth-engine'
    static_configs:
      - targets: ['growth-engine:8007']
    metrics_path: /metrics

  - job_name: 'founder-copilot'
    static_configs:
      - targets: ['founder-copilot:8008']
    metrics_path: /metrics

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8010']
    metrics_path: /metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
