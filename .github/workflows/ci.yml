name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check apps/backend apps/worker apps/agent_runtime apps/scaleos_supervisor apps/seo_osint_agent apps/growth_intelligence_agent
      - run: ruff format --check apps/

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: venture
          POSTGRES_PASSWORD: venture
          POSTGRES_DB: venture_studio_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://venture:venture@localhost:5432/venture_studio_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-32-chars-minimum
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r apps/backend/requirements.txt pytest pytest-asyncio httpx
      - run: pytest apps/backend/tests -v --tb=short

  frontend-lint:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-build:
    name: Docker — Build all images
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -t venture-studio/backend:ci apps/backend
      - name: Build worker
        run: docker build -t venture-studio/worker:ci apps/worker
      - name: Build frontend
        run: docker build -t venture-studio/frontend:ci apps/frontend
      - name: Build agent_runtime
        run: docker build -t venture-studio/agent-runtime:ci apps/agent_runtime
