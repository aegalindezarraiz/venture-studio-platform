version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-venture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-venture}
      POSTGRES_DB: ${POSTGRES_DB:-venture_studio}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venture}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./apps/backend:/app

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./apps/worker:/app

  agent_runtime:
    build:
      context: ./apps/agent_runtime
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - nats
      - postgres

  scaleos_supervisor:
    build:
      context: ./apps/scaleos_supervisor
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - nats
      - postgres

  seo_osint_agent:
    build:
      context: ./apps/seo_osint_agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      - nats

  growth_intelligence_agent:
    build:
      context: ./apps/growth_intelligence_agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      - nats

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  qdrant_data:
