apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: venture-studio
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8012"
    spec:
      containers:
        - name: billing-service
          image: ghcr.io/aegalindezarraiz/billing-service:latest
          ports:
            - containerPort: 8012
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8012"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: venture-studio
spec:
  selector:
    app: billing-service
  ports:
    - port: 8012
      targetPort: 8012
  type: ClusterIP
