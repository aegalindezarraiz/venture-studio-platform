apiVersion: apps/v1
kind: Deployment
metadata:
  name: opportunity-engine
  namespace: venture-studio
  labels:
    app: opportunity-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opportunity-engine
  template:
    metadata:
      labels:
        app: opportunity-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      containers:
        - name: opportunity-engine
          image: ghcr.io/aegalindezarraiz/opportunity-engine:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8003"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opportunity-engine
  namespace: venture-studio
spec:
  selector:
    app: opportunity-engine
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
