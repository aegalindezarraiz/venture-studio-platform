apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-pipeline
  namespace: venture-studio
  labels:
    app: investment-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investment-pipeline
  template:
    metadata:
      labels:
        app: investment-pipeline
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
    spec:
      containers:
        - name: investment-pipeline
          image: ghcr.io/aegalindezarraiz/investment-pipeline:latest
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8006"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: investment-pipeline
  namespace: venture-studio
spec:
  selector:
    app: investment-pipeline
  ports:
    - port: 8006
      targetPort: 8006
  type: ClusterIP
