apiVersion: apps/v1
kind: Deployment
metadata:
  name: founder-copilot
  namespace: venture-studio
  labels:
    app: founder-copilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: founder-copilot
  template:
    metadata:
      labels:
        app: founder-copilot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8008"
    spec:
      containers:
        - name: founder-copilot
          image: ghcr.io/aegalindezarraiz/founder-copilot:latest
          ports:
            - containerPort: 8008
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8008"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: founder-copilot
  namespace: venture-studio
spec:
  selector:
    app: founder-copilot
  ports:
    - port: 8008
      targetPort: 8008
  type: ClusterIP
