apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-intel
  namespace: venture-studio
  labels:
    app: market-intel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-intel
  template:
    metadata:
      labels:
        app: market-intel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
    spec:
      containers:
        - name: market-intel
          image: ghcr.io/aegalindezarraiz/market-intel:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8002"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: market-intel
  namespace: venture-studio
spec:
  selector:
    app: market-intel
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
