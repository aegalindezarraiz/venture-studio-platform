apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-generator
  namespace: venture-studio
  labels:
    app: startup-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: startup-generator
  template:
    metadata:
      labels:
        app: startup-generator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
    spec:
      containers:
        - name: startup-generator
          image: ghcr.io/aegalindezarraiz/startup-generator:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8005"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: startup-generator
  namespace: venture-studio
spec:
  selector:
    app: startup-generator
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP
