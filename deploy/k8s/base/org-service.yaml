apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-service
  namespace: venture-studio
  labels:
    app: org-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org-service
  template:
    metadata:
      labels:
        app: org-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8011"
    spec:
      containers:
        - name: org-service
          image: ghcr.io/aegalindezarraiz/org-service:latest
          ports:
            - containerPort: 8011
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8011"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: org-service
  namespace: venture-studio
spec:
  selector:
    app: org-service
  ports:
    - port: 8011
      targetPort: 8011
  type: ClusterIP
