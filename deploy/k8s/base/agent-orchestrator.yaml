apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: venture-studio
  labels:
    app: agent-orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: agent-orchestrator
          image: ghcr.io/aegalindezarraiz/agent-orchestrator:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8001"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: venture-studio
spec:
  selector:
    app: agent-orchestrator
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
