apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-factory
  namespace: venture-studio
  labels:
    app: product-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-factory
  template:
    metadata:
      labels:
        app: product-factory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
    spec:
      containers:
        - name: product-factory
          image: ghcr.io/aegalindezarraiz/product-factory:latest
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8004"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-factory
  namespace: venture-studio
spec:
  selector:
    app: product-factory
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
