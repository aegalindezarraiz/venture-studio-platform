apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: venture-studio
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8010"
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/aegalindezarraiz/auth-service:latest
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: venture-studio-config
            - secretRef:
                name: venture-studio-secrets
          env:
            - name: PORT
              value: "8010"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: venture-studio
spec:
  selector:
    app: auth-service
  ports:
    - port: 8010
      targetPort: 8010
  type: ClusterIP
